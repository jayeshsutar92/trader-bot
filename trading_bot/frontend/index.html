<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Futures Bot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Binance Futures Bot</h1>
            <p>Execute MARKET and LIMIT orders</p>
        </header>

        <main>
            <form id="orderForm">
                <div class="form-group">
                    <label for="symbol">Symbol</label>
                    <input type="text" id="symbol" name="symbol" placeholder="e.g., BTCUSDT" required autocomplete="off">
                    <div class="error-text" id="symbolError"></div>
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label for="side">Side</label>
                        <select id="side" name="side">
                            <option value="BUY">BUY</option>
                            <option value="SELL">SELL</option>
                        </select>
                    </div>

                    <div class="form-group half">
                        <label for="type">Order Type</label>
                        <select id="type" name="type">
                            <option value="MARKET">MARKET</option>
                            <option value="LIMIT">LIMIT</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" name="quantity" step="any" placeholder="0.001" required>
                    <div class="error-text" id="quantityError"></div>
                </div>

                <div class="form-group" id="priceGroup" style="display: none;">
                    <label for="price">Price (USDT)</label>
                    <input type="number" id="price" name="price" step="any" placeholder="50000">
                    <div class="error-text" id="priceError"></div>
                </div>

                <button type="submit" id="submitBtn">Place Order</button>
            </form>

            <div id="feedbackContainer" class="feedback hidden">
                <h3 id="feedbackTitle">Status</h3>
                <p id="feedbackMessage"></p>
                <div id="orderDetails" class="order-details hidden">
                    <p><strong>Order ID:</strong> <span id="orderId"></span></p>
                    <p><strong>Status:</strong> <span id="orderStatus"></span></p>
                    <p><strong>Executed Qty:</strong> <span id="orderQty"></span></p>
                    <p><strong>Avg Price:</strong> <span id="orderAvgPrice"></span></p>
                </div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
